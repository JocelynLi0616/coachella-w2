<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Coachella W2">
  <meta name="theme-color" content="#0d0d0d">
  <title>🌴 Coachella W2 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:     #0d0d0d;
      --card:   #1a1a1a;
      --border: #2a2a2a;
      --text:   #f0f0f0;
      --sub:    #777;
      --gold:   #f5c842;
      --c1: #4ade80;   /* Anna  — green  */
      --c2: #fbbf24;   /* Yuan  — yellow */
      --c3: #60a5fa;   /* P3    — blue   */
      --c4: #f472b6;   /* P4    — pink   */
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Top nav ──────────────────────────────────────────── */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px 12px;
      background: rgba(13,13,13,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .top-nav h1 { font-size: 16px; font-weight: 700; }
    .page-tabs { display: flex; gap: 6px; }
    .page-tab {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: none; color: var(--sub); font-family: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .page-tab.active { background: var(--text); color: #000; border-color: var(--text); }

    /* ── Logistics page ───────────────────────────────────── */
    .page { padding: 20px; }

    .flights-section { margin-bottom: 20px; }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--sub);
      display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
    }
    .flights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }
    .flight-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      border-left: 3px solid var(--person-color, var(--border));
    }
    .flight-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--sub);
      display: flex; align-items: center; gap: 5px; margin-bottom: 8px;
    }
    .flight-route { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 5px; }
    .flight-detail { font-size: 12px; color: var(--sub); line-height: 1.5; }

    .hotel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 24px; }
    .hotel-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    .hotel-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .hotel-detail { font-size: 12px; color: var(--sub); line-height: 1.6; }

    /* ── Person pills ─────────────────────────────────────── */
    .person-row {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
    }
    .person-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--sub); font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .person-pill.active {
      background: var(--p-bg, var(--card));
      border-color: var(--p-bg, var(--border));
      color: #000;
    }
    .pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Day tabs ─────────────────────────────────────────── */
    .day-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .day-tab {
      padding: 7px 18px; border-radius: 20px;
      border: 1px solid var(--border); background: none;
      color: var(--sub); font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .day-tab.active { background: var(--gold); border-color: var(--gold); color: #000; }

    /* ── Sub-tabs ─────────────────────────────────────────── */
    .sub-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .sub-tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: none;
      color: var(--sub); font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .sub-tab.active { background: var(--text); border-color: var(--text); color: #000; }

    /* ── Hint text ────────────────────────────────────────── */
    .hint {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--sub); margin-bottom: 12px;
    }

    /* ── Artist grid ──────────────────────────────────────── */
    .artist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }
    .artist-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      border-left: 3px solid var(--border);
      transition: border-color 0.15s;
    }
    .artist-card.headliner { border-left-color: var(--gold); }
    .artist-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; line-height: 1.3; }
    .headliner-badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.8px;
      color: var(--gold); text-transform: uppercase; margin-bottom: 4px;
    }
    .artist-meta { font-size: 12px; color: var(--sub); margin-bottom: 10px; }
    .pick-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      padding: 3px 10px; border-radius: 12px;
      border: 1px solid var(--border); background: none;
      color: var(--sub); font-family: inherit; font-size: 11px;
      font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .chip.picked { border-color: transparent; color: #000; }

    /* ── Group overlap & daily plan ───────────────────────── */
    .overlap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 10px;
    }
    .overlap-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
    }
    .overlap-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .overlap-meta { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
    .who-dots { display: flex; gap: 5px; flex-wrap: wrap; }
    .who-dot {
      padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700; color: #000;
    }

    .timeline { display: flex; flex-direction: column; gap: 0; }
    .timeline-row {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .timeline-row:last-child { border-bottom: none; }
    .tl-time { width: 64px; font-size: 12px; color: var(--sub); flex-shrink: 0; padding-top: 2px; font-variant-numeric: tabular-nums; }
    .tl-info { flex: 1; }
    .tl-name { font-size: 14px; font-weight: 700; }
    .tl-meta { font-size: 11px; color: var(--sub); margin-top: 2px; }
    .tl-who { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
    .tl-pip { width: 7px; height: 7px; border-radius: 50%; }
    .conflict-badge {
      font-size: 10px; color: #ef4444; font-weight: 700;
      margin-top: 2px;
    }

    .day-group-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--sub);
      padding: 12px 0 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }

    /* ── Packing page ─────────────────────────────────────── */
    .pack-section { margin-bottom: 24px; }
    .pack-label {
      font-size: 13px; font-weight: 700; color: var(--text);
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .pack-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden;
    }
    .pack-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .pack-item:last-child { border-bottom: none; }
    .pack-check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 1.5px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 900; transition: all 0.15s;
    }
    .pack-check.done { background: var(--gold); border-color: var(--gold); color: #000; }
    .pack-text { font-size: 13px; line-height: 1.4; }
    .pack-text.done { opacity: 0.4; text-decoration: line-through; }
    .add-pack-row { display: flex; gap: 8px; margin-top: 10px; }
    .add-pack-input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 9px 12px; color: var(--text);
      font-family: inherit; font-size: 13px; outline: none;
    }
    .add-pack-input:focus { border-color: var(--gold); }
    .add-pack-btn {
      background: var(--gold); color: #000; border: none;
      border-radius: 10px; padding: 9px 16px;
      font-family: inherit; font-weight: 700; font-size: 16px; cursor: pointer;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95); color: #000;
      padding: 9px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      z-index: 500; opacity: 0; transition: opacity 0.2s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* ── Who-are-you modal ────────────────────────────────── */
    .who-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .who-overlay.hidden { display: none; }
    .who-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 340px;
      text-align: center;
    }
    .who-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .who-sub   { font-size: 13px; color: var(--sub); margin-bottom: 24px; }
    .who-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .who-btn {
      padding: 16px 10px; border-radius: 14px;
      border: 2px solid var(--border); background: none;
      color: var(--text); font-family: inherit; font-size: 16px;
      font-weight: 700; cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .who-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Empty ────────────────────────────────────────────── */
    .empty { padding: 40px 20px; text-align: center; color: var(--sub); font-size: 14px; }

    @media (max-width: 480px) {
      .page { padding: 14px; }
      .artist-grid, .overlap-grid { grid-template-columns: 1fr 1fr; }
      .flights-grid, .hotel-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 360px) {
      .artist-grid, .overlap-grid { grid-template-columns: 1fr; }
      .flights-grid, .hotel-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════
// PACKING
// ═══════════════════════════════════════════════════════════════

const DEFAULT_PACKING = [];

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════

let state = {
  myId:    null,
  names:   { p1:'Anna', p2:'Yuan', p3:'10', p4:'汪汪' },
  picks:   {},
  packing: JSON.parse(JSON.stringify(DEFAULT_PACKING)),
};

let ui = {
  page: 'logistics',
  day:  'fri',
  view: 'browse',
};

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════

function save() {
  try { localStorage.setItem('cw2_v3', JSON.stringify(state)); } catch(e) {}
}

function load() {
  try {
    if (location.hash.startsWith('#s=')) {
      const imp = JSON.parse(atob(decodeURIComponent(location.hash.slice(3))));
      Object.assign(state, imp);
      history.replaceState(null, '', location.pathname);
      save();
      setTimeout(() => toast('📥 Loaded shared state!'), 300);
      return;
    }
    const raw = localStorage.getItem('cw2_v3');
    if (raw) {
      const sv = JSON.parse(raw);
      state.myId    = sv.myId    ?? null;
      state.names   = { ...state.names, ...(sv.names || {}) };
      state.picks   = sv.picks   || {};
      state.packing = sv.packing?.length ? sv.packing : JSON.parse(JSON.stringify(DEFAULT_PACKING));
    }
  } catch(e) {}
}

function shareLink() {
  const payload = { myId: state.myId, names: state.names, picks: state.picks, packing: state.packing };
  const url = `${location.origin}${location.pathname}#s=${encodeURIComponent(btoa(JSON.stringify(payload)))}`;
  navigator.clipboard.writeText(url)
    .then(() => toast('🔗 Link copied — paste in your group chat!'))
    .catch(() => prompt('Copy this link:', url));
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

function person(id) {
  const p = PEOPLE.find(x => x.id === id);
  return p ? { ...p, name: state.names[id] || p.name } : null;
}

function picks(aid) { return state.picks[aid] || []; }
function hasPick(aid, pid) { return picks(aid).includes(pid); }
function togglePick(aid, pid) {
  const cur = picks(aid);
  state.picks[aid] = cur.includes(pid) ? cur.filter(x => x !== pid) : [...cur, pid];
  save(); renderArtistSection();
}

function t2n(t) {
  if (!t) return 9999;
  const clean = t.replace('~','').trim();
  const m = clean.match(/^(\d+):(\d+)\s*(AM|PM)$/i);
  if (!m) return 9999;
  let h = parseInt(m[1]), min = parseInt(m[2]);
  if (m[3].toUpperCase() === 'PM' && h !== 12) h += 12;
  if (m[3].toUpperCase() === 'AM' && h === 12) h = 0;
  if (h < 12) h += 24;
  return h * 60 + min;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

function chipLabel(pid) {
  const p = person(pid);
  if (!p) return '';
  if (pid === state.myId) return 'You';
  // Friend index (1-based, skipping myId)
  const others = PEOPLE.filter(x => x.id !== state.myId);
  const idx = others.findIndex(x => x.id === pid);
  return idx >= 0 ? `Friend ${idx + 2}` : p.name;
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════

function render() {
  renderFlights();
  renderPersonRow();
  renderArtistSection();
  renderPacking();
}

// ── Flights ───────────────────────────────────────────────────

function renderFlights() {
  const inbound = FLIGHTS.filter(f => f.dir === 'inbound').sort((a,b) => a.dep.localeCompare(b.dep));
  const ret     = FLIGHTS.filter(f => f.dir === 'return').sort((a,b) => a.dep.localeCompare(b.dep));

  function flightCard(f) {
    const p = person(f.pid);
    const emoji = f.pid === 'p1' ? '🧳' : '🧳';
    return `<div class="flight-card" style="--person-color:${p.color}">
      <div class="flight-label">${emoji} ${esc(f.dir.toUpperCase())} · ${esc(p.name.toUpperCase())}</div>
      <div class="flight-route">${esc(f.from)} → ${esc(f.to)}</div>
      <div class="flight-detail">${esc(f.flight)} · ${esc(f.date)} · ${esc(f.dep)}${f.arr ? ' – ' + esc(f.arr) : ''}</div>
    </div>`;
  }

  document.getElementById('inbound-flights').innerHTML = inbound.map(flightCard).join('');
  document.getElementById('return-flights').innerHTML  = ret.map(flightCard).join('');
}

// ── Person row ────────────────────────────────────────────────

function renderPersonRow() {
  const row = document.getElementById('person-row');
  row.innerHTML = PEOPLE.map(p => {
    const pn = person(p.id);
    const active = state.myId === p.id;
    return `<button class="person-pill ${active ? 'active' : ''}"
      style="${active ? `--p-bg:${p.color}` : ''}"
      onclick="selectMe('${p.id}')">
      <div class="pip" style="background:${p.color}"></div>
      ${esc(pn.name)}
    </button>`;
  }).join('');
}

// ── Artist section ────────────────────────────────────────────

function renderArtistSection() {
  // Update day tabs
  ['fri','sat','sun'].forEach(d => {
    document.getElementById('dtab-' + d)?.classList.toggle('active', d === ui.day);
  });
  // Update sub-tabs
  ['browse','overlap','plan'].forEach(v => {
    document.getElementById('vtab-' + v)?.classList.toggle('active', v === ui.view);
  });
  // Update hint
  const hintEl = document.getElementById('hint-text');
  if (hintEl) {
    const hints = {
      browse:  'TAP A NAME TO MARK WHO WANTS TO SEE EACH ARTIST',
      overlap: 'ARTISTS 2+ PEOPLE WANT TO SEE TOGETHER',
      plan:    'EVERYONE\'S PICKS SORTED BY TIME',
    };
    hintEl.textContent = hints[ui.view] || '';
  }

  const el = document.getElementById('artist-section');
  if (!el) return;

  switch(ui.view) {
    case 'browse':  el.innerHTML = renderBrowse();  break;
    case 'overlap': el.innerHTML = renderOverlap(); break;
    case 'plan':    el.innerHTML = renderPlan();    break;
  }
}

function renderBrowse() {
  const artists = LINEUP
    .filter(a => a.day === ui.day)
    .sort((a,b) => t2n(a.time) - t2n(b.time));

  if (!artists.length) return '<div class="empty">No artists listed for this day</div>';

  return `<div class="artist-grid">${artists.map(a => {
    const picked = picks(a.id);
    const chips = PEOPLE.map(p => {
      const isPicked = picked.includes(p.id);
      const label = p.id === state.myId ? 'You' : chipLabel(p.id);
      return `<button class="chip ${isPicked ? 'picked' : ''}"
        style="${isPicked ? `background:${p.color}` : ''}"
        onclick="togglePick('${a.id}','${p.id}')">
        ${esc(label)}
      </button>`;
    }).join('');

    return `<div class="artist-card ${a.headliner ? 'headliner' : ''}">
      ${a.headliner ? '<div class="headliner-badge">HEADLINER</div>' : ''}
      <div class="artist-name">${esc(a.name)}</div>
      <div class="artist-meta">${esc(a.stage)} · ${esc(a.time)}${a.est ? ' <span style="opacity:.5;font-size:10px">est.</span>' : ''}</div>
      <div class="pick-chips">${chips}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderOverlap() {
  const shared = LINEUP
    .filter(a => a.day === ui.day && picks(a.id).length >= 2)
    .sort((a,b) => t2n(a.time) - t2n(b.time));

  if (!shared.length) return `<div class="empty">No shared picks yet for ${ui.day.charAt(0).toUpperCase()+ui.day.slice(1)}day.<br><small style="opacity:.6">Add picks in Browse &amp; Pick</small></div>`;

  return `<div class="overlap-grid">${shared.map(a => {
    const ps = picks(a.id);
    const dots = ps.map(pid => {
      const p = person(pid);
      return `<div class="who-dot" style="background:${p.color}">${esc(p.name.charAt(0))}</div>`;
    }).join('');
    return `<div class="overlap-card">
      <div class="overlap-name">${esc(a.name)}</div>
      <div class="overlap-meta">${esc(a.stage)} · ${esc(a.time)}</div>
      <div class="who-dots">${dots}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderPlan() {
  // All picks across selected day, sorted by time, grouped by day
  const allDays = ui.day === 'all'
    ? ['fri','sat','sun']
    : [ui.day];

  let html = '';
  allDays.forEach(day => {
    const dayArtists = LINEUP
      .filter(a => a.day === day && picks(a.id).length > 0)
      .sort((a,b) => t2n(a.time) - t2n(b.time));

    if (!dayArtists.length) return;

    dayArtists.forEach((a, i) => {
      const ps = picks(a.id);
      const dots = ps.map(pid => {
        const p = person(pid);
        return `<div class="tl-pip" style="background:${p.color}" title="${p.name}"></div>`;
      }).join('');

      // Conflict: same time slot, more than one pick
      const sameTime = dayArtists.filter((b,j) => j !== i && Math.abs(t2n(a.time) - t2n(b.time)) < 60);
      const conflict = sameTime.length > 0;

      html += `<div class="timeline-row">
        <div class="tl-time">${esc(a.time)}</div>
        <div class="tl-info">
          <div class="tl-name">${esc(a.name)}</div>
          <div class="tl-meta">${esc(a.stage)}</div>
          <div class="tl-who">${dots}</div>
          ${conflict ? '<div class="conflict-badge">⚠ Overlapping picks</div>' : ''}
        </div>
      </div>`;
    });
  });

  if (!html) return `<div class="empty">No picks yet for this day.<br><small style="opacity:.6">Add picks in Browse &amp; Pick</small></div>`;
  return `<div class="timeline">${html}</div>`;
}

// ── Packing ───────────────────────────────────────────────────

function renderPacking() {
  const el = document.getElementById('packing-content');
  if (!el) return;

  const doneCount = state.packing.filter(n => n.done).length;
  const total = state.packing.length;

  let itemsHtml = '';
  if (state.packing.length) {
    itemsHtml = `<div class="pack-card" style="margin-bottom:16px">
      ${state.packing.map(n => `
        <div class="pack-item" onclick="togglePack('${n.id}')">
          <div class="pack-check ${n.done ? 'done' : ''}">${n.done ? '✓' : ''}</div>
          <div class="pack-text ${n.done ? 'done' : ''}">${esc(n.text)}</div>
        </div>`).join('')}
    </div>`;
  } else {
    itemsHtml = `<div class="empty" style="padding:32px 0">Nothing here yet — add items below</div>`;
  }

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>
        <div style="font-size:18px;font-weight:700">🎒 Packing List</div>
        <div style="font-size:12px;color:var(--sub);margin-top:3px">${total ? `${doneCount}/${total} done` : 'Tap to check off items'}</div>
      </div>
      <button onclick="shareLink()" style="background:var(--gold);color:#000;border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer">🔗 Share</button>
    </div>
    ${itemsHtml}
    <div class="add-pack-row">
      <input class="add-pack-input" id="packInput" placeholder="Add item..." onkeydown="if(event.key==='Enter')addPackItem()">
      <button class="add-pack-btn" onclick="addPackItem()">+</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function setPage(p) {
  ui.page = p;
  document.getElementById('pg-logistics').style.display = p === 'logistics' ? '' : 'none';
  document.getElementById('pg-packing').style.display   = p === 'packing'   ? '' : 'none';
  document.getElementById('ptab-logistics').classList.toggle('active', p === 'logistics');
  document.getElementById('ptab-packing').classList.toggle('active',   p === 'packing');
  if (p === 'packing') renderPacking();
}

function setDay(d)  { ui.day = d;  renderArtistSection(); }
function setView(v) { ui.view = v; renderArtistSection(); }

function selectMe(id) {
  state.myId = id;
  save();
  renderPersonRow();
  renderArtistSection();
  const p = person(id);
  toast(`👋 Hey ${p.name}!`);
}

function togglePack(id) {
  const n = state.packing.find(x => x.id === id);
  if (n) { n.done = !n.done; save(); renderPacking(); }
}

function addPackItem() {
  const text = document.getElementById('packInput')?.value?.trim();
  if (!text) return;
  state.packing.push({ id:'pk'+Date.now(), text, done:false });
  save(); renderPacking();
}

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════

function renderWhoModal() {
  const grid = document.getElementById('who-grid');
  if (!grid) return;
  grid.innerHTML = PEOPLE.map(p => `
    <button class="who-btn" onclick="chooseMe('${p.id}')" style="border-color:${p.color}20">
      <span style="width:10px;height:10px;border-radius:50%;background:${p.color};flex-shrink:0;display:inline-block"></span>
      ${esc(state.names[p.id] || p.name)}
    </button>`).join('');
}

function chooseMe(id) {
  state.myId = id;
  save();
  document.getElementById('who-overlay').classList.add('hidden');
  renderPersonRow();
  renderArtistSection();
  const p = person(id);
  toast(`👋 Hey ${p.name}!`);
}

load();
render();

// Show who-modal if identity not yet set
if (!state.myId) {
  renderWhoModal();
  document.getElementById('who-overlay').classList.remove('hidden');
}
</script>
